name: docker-image

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Existing branch, tag, or commit SHA to build. Leave empty to build the selected branch.
        required: false
        type: string
      image_tag:
        description: Container tag to publish. Defaults to the selected source ref or branch name with '/' replaced by '-'.
        required: false
        type: string
      push_latest:
        description: Also publish latest and latest-<arch> tags.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.meta.outputs.source_ref }}
      version: ${{ steps.meta.outputs.version }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
      push_latest: ${{ steps.meta.outputs.push_latest }}
      amd64_tags: ${{ steps.meta.outputs.amd64_tags }}
      arm64_tags: ${{ steps.meta.outputs.arm64_tags }}
      commit: ${{ steps.build_meta.outputs.commit }}
      build_date: ${{ steps.build_meta.outputs.build_date }}
    steps:
      - name: Prepare image metadata
        id: meta
        shell: bash
        env:
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          set -euo pipefail

          source_ref="$INPUT_SOURCE_REF"
          if [[ -z "$source_ref" ]]; then
            source_ref="$GITHUB_REF_NAME"
          fi

          source_name="$source_ref"
          source_name="${source_name#refs/heads/}"
          source_name="${source_name#refs/tags/}"

          version="$INPUT_IMAGE_TAG"
          if [[ -z "$version" ]]; then
            version="${source_name//\//-}"
          fi

          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          amd64_tags="${image_repo}:${version}-amd64"
          arm64_tags="${image_repo}:${version}-arm64"
          if [[ "$PUSH_LATEST" == "true" ]]; then
            amd64_tags="${amd64_tags}"$'\n'"${image_repo}:latest-amd64"
            arm64_tags="${arm64_tags}"$'\n'"${image_repo}:latest-arm64"
          fi

          {
            echo "source_ref=$source_ref"
            echo "version=$version"
            echo "image_repo=$image_repo"
            echo "push_latest=$PUSH_LATEST"
            echo "amd64_tags<<EOF"
            printf '%s\n' "$amd64_tags"
            echo "EOF"
            echo "arm64_tags<<EOF"
            printf '%s\n' "$arm64_tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.source_ref }}
      - name: Finalize image metadata
        id: build_meta
        shell: bash
        run: |
          set -euo pipefail
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  docker_amd64:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ needs.prepare.outputs.commit }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
          tags: ${{ needs.prepare.outputs.amd64_tags }}

  docker_arm64:
    runs-on: ubuntu-24.04-arm
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ needs.prepare.outputs.commit }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
          tags: ${{ needs.prepare.outputs.arm64_tags }}

  docker_manifest:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - docker_amd64
      - docker_arm64
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifests
        shell: bash
        env:
          IMAGE_REPO: ${{ needs.prepare.outputs.image_repo }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PUSH_LATEST: ${{ needs.prepare.outputs.push_latest }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            --tag "${IMAGE_REPO}:${VERSION}" \
            "${IMAGE_REPO}:${VERSION}-amd64" \
            "${IMAGE_REPO}:${VERSION}-arm64"

          if [[ "$PUSH_LATEST" == "true" ]]; then
            docker buildx imagetools create \
              --tag "${IMAGE_REPO}:latest" \
              "${IMAGE_REPO}:latest-amd64" \
              "${IMAGE_REPO}:latest-arm64"
          fi
